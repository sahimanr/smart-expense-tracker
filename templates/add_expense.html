{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4 mt-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                <div class="d-flex align-items-center mb-3">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-secondary rounded-circle p-2 me-3 shadow-sm d-flex justify-content-center align-items-center" style="width: 36px; height: 36px;" title="Back">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                        </svg>
                    </a>
                    <h3 class="fw-bold m-0 text-primary">Add New Expense</h3>
                </div>
            </div>
            <div class="card-body p-4 pt-3">
                <form method="POST" action="{{ url_for('add_expense') }}">
                    <div class="mb-3">
                        <label for="amount" class="form-label text-muted fw-bold">Amount (Rs)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control form-control-lg rounded-3 bg-light" id="amount" name="amount" required placeholder="0.00">
                    </div>
                    
                    <div class="mb-3">
                        <label for="category" class="form-label text-muted fw-bold">Category</label>
                        <select class="form-select form-select-lg rounded-3 bg-light" id="category" name="category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Food">Food & Dining</option>
                            <option value="Travel">Transportation & Travel</option>
                            <option value="Shopping">Shopping & Retail</option>
                            <option value="Bills">Bills & Utilities</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label text-muted fw-bold">Description</label>
                        <input type="text" class="form-control form-control-lg rounded-3 bg-light" id="description" name="description" placeholder="What was this expense for?">
                    </div>
                    
                    <div class="mb-4">
                        <label for="date" class="form-label text-muted fw-bold">Date</label>
                        <input type="date" class="form-control form-control-lg rounded-3 bg-light" id="date" name="date">
                        <small class="text-muted">Defaults to today if left blank.</small>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg rounded-3 shadow-sm fw-bold">Save Expense</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const dateInput = document.getElementById('date');
        if (!dateInput.value) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
        }
    });
</script>
{% endblock %}
