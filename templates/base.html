<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Expense Tracker</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #311847;">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand text-white fw-bold">ExpenseTracker</a>

    <!-- Toggler -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Links -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav ms-auto nav-underline">

        <li class="nav-item">
          <a href="{{url_for('dashboard')}}" class="nav-link text-white">Dashboard</a>
        </li>

        <li class="nav-item">
          <a href="{{url_for('add_expense')}}" class="nav-link text-white">Add Expense</a>
        </li>

        <li class="nav-item">
          <a href="{{url_for('logout')}}" class="nav-link text-danger">Logout</a>
        </li>

      </ul>
    </div>

  </div>
</nav>

{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
